<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>CSCA Campus | 数字化方案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav
        class="no-print sticky top-0 bg-white border-b border-gray-100 px-8 py-3 flex justify-between items-center z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div
                class="w-7 h-7 bg-green-500 rounded-lg flex items-center justify-center text-white font-bold text-sm italic">
                C</div>
            <div class="text-lg font-bold text-gray-700 tracking-tight">360 Global Edu</div>
        </div>
        <div class="flex items-center gap-3">
            <a href="demo.html" target="_blank"
                class="flex items-center gap-2 border-2 border-green-500 text-green-600 px-5 py-2 rounded-xl font-bold text-xs hover:bg-green-50 transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                查看项目 Demo
            </a>
        
            <button onclick="window.print()"
                class="bg-[#1CB0F6] text-white px-6 py-2 rounded-xl font-bold text-xs shadow-md hover:scale-105 transition-all">
                导出 PDF
            </button>
        </div>
    </nav>

    <div id="sidebar" class="no-print fixed left-6 top-1/2 -translate-y-1/2 z-[60] flex items-start">
        <div id="menu-card"
            class="hidden bg-white border-[3px] border-[#E5E5E5] rounded-[1.5rem] p-4 shadow-xl w-56 transition-all overflow-hidden">
            <div class="flex justify-between items-center mb-4 px-1">
                <span class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Outline</span>
                <button onclick="toggleSidebar()" class="text-gray-300 hover:text-gray-500 text-xs font-bold">✕</button>
            </div>
        
            <nav id="auto-nav" class="flex flex-col gap-1 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
            </nav>
        </div>
        <button id="expand-btn" onclick="toggleSidebar()"
            class="ml-[-10px] bg-white border-[3px] border-[#E5E5E5] rounded-full w-12 h-12 shadow-lg flex flex-col items-center justify-center gap-1 hover:border-green-500 transition-all group">
            <div class="w-4 h-1 bg-green-500 rounded-full group-hover:bg-green-600"></div>
            <div class="w-4 h-1 bg-blue-500 rounded-full group-hover:bg-green-600"></div>
            <div class="w-4 h-1 bg-orange-500 rounded-full group-hover:bg-green-600"></div>
        </button>
    </div>

    <main id="content">
        <section id="home" class="ppt-page flex-row items-center justify-between">
            <div class="w-3/5">
                <h1 class="text-5xl font-extrabold text-blue-400">直通中国<br><span
                        class="text-green-500 text-6xl tracking-tighter">360 Global Edu</span></h1>
                <p class="text-sm font-bold text-gray-300 mt-6 tracking-[0.3em] uppercase opacity-60">Digital Admissions
                    2026</p>
            </div>
            <div
                class="w-28 h-28 bg-green-500 rounded-[2.2rem] flex items-center justify-center text-white text-5xl font-black italic shadow-lg">
                C</div>
        </section>

        <div id="dynamic-chapters"></div>

        <section id="end" class="ppt-page flex-col items-center justify-center text-center bg-gray-50 relative overflow-hidden">
            <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-green-50 rounded-full blur-3xl opacity-50"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-blue-50 rounded-full blur-3xl opacity-50"></div>
        
            <div class="relative z-10">
                <div
                    class="w-20 h-20 bg-green-500 rounded-[1.5rem] flex items-center justify-center text-white text-4xl font-black italic shadow-xl mx-auto mb-8">
                    C
                </div>
        
                <h2 class="text-5xl font-extrabold text-gray-800 tracking-tight">
                    360 Global Edu
                </h2>
        
                <p class="text-xl text-gray-400 mt-4 font-medium">
                    CSCA Campus
                </p>
        
                <div class="w-16 h-1 bg-green-500 mx-auto my-10 rounded-full"></div>
        
            </div>
        
            <div class="absolute bottom-10 text-[10px] font-bold text-gray-300 uppercase tracking-[0.5em]">
                CSCA Campus Strategic Plan © 2026
            </div>
        </section>
    </main>

    <div id="image-overlay"
        class="fixed inset-0 bg-black/90 z-[9999] hidden flex items-center justify-center cursor-zoom-out"
        onclick="closeOverlay()">
        <img id="overlay-img" src=""
            class="max-w-[90%] max-h-[90%] object-contain shadow-2xl transition-transform duration-300">
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
